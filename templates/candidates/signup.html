{% extends 'base.html' %}
{% block title %}Candidate Sign Up — TalentMatch{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <a href="{% url 'landing' %}" class="nav-brand">TalentMatch</a>
        <h2>Create Candidate Account</h2>
        {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign Up</button>
        </form>
        <p class="auth-link">Already have an account? <a href="{% url 'candidate_login' %}">Log In</a></p>
        <p class="auth-link"><a href="{% url 'landing' %}">Back to Home</a></p>
    </div>
</div>
{% endblock %}
