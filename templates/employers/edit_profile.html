{% extends 'base.html' %}
{% block title %}Edit Company Profile — TalentMatch{% endblock %}

{% block navbar %}
<nav class="topnav">
    <div class="nav-brand">TalentMatch</div>
    <div class="nav-links">
        <a href="{% url 'employer_dashboard' %}">Dashboard</a>
        <a href="{% url 'view_candidates' %}">Candidates</a>
        <a href="{% url 'recommendations_list' %}">Recommendations</a>
        <a href="{% url 'post_job' %}">Post a Job</a>
    </div>
    <div class="nav-right">
        <span>{{ request.user.email }}</span>
        <a href="{% url 'employer_logout' %}" class="btn btn-outline btn-sm">Logout</a>
    </div>
</nav>
{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1>Edit Company Profile</h1>
    </div>

    <div class="form-card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" name="company_name" value="{{ employer.company_name }}" required>
            </div>
            <div class="form-group">
                <label>Company Description</label>
                <textarea name="company_info" rows="5" required>{{ employer.company_info }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'employer_dashboard' %}" class="btn btn-outline">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
